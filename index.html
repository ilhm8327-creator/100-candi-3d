<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Candi Untuk Nadia Zerlina</title><style>
body{
    margin:0;
    overflow:hidden;
}

#judul{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:32px;
    font-weight:bold;
    text-shadow:2px 2px 10px black;
    z-index:10;
}

#info{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    color:white;
    z-index:10;
}
</style></head><body><div id="judul">
❤️ Buat Sayangku Nadia Zerlina ❤️
</div><div id="info">
WASD = Jalan | Mouse = Lihat Sekitar
</div><script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,2,15);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

// Cahaya
const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,30,20);
scene.add(sun);

scene.add(
new THREE.AmbientLight(
0xffffff,
0.6
)
);

// Tanah
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({
color:0x55aa55
})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Membuat candi
function createTemple(x,z){

const group = new THREE.Group();

const mat =
new THREE.MeshStandardMaterial({
color:0x777777
});

const base = new THREE.Mesh(
new THREE.BoxGeometry(3,1,3),
mat
);

const body = new THREE.Mesh(
new THREE.BoxGeometry(2,3,2),
mat
);

body.position.y = 2;

const roof = new THREE.Mesh(
new THREE.ConeGeometry(1.7,3,4),
mat
);

roof.position.y = 5;
roof.rotation.y = Math.PI/4;

group.add(base);
group.add(body);
group.add(roof);

group.position.set(x,0,z);

scene.add(group);
}

// 100 candi
for(let i=0;i<10;i++){

for(let j=0;j<10;j++){

createTemple(
i*8-40,
j*8-40
);

}

}

// Kontrol WASD
const keys={};

window.addEventListener(
'keydown',
(e)=>keys[e.key.toLowerCase()]=true
);

window.addEventListener(
'keyup',
(e)=>keys[e.key.toLowerCase()]=false
);

// Mouse look
let yaw=0;

window.addEventListener('mousemove',(e)=>{

yaw -= e.movementX*0.002;

});

function animate(){

requestAnimationFrame(animate);

const speed=0.2;

if(keys['w']){
camera.position.x -= Math.sin(yaw)*speed;
camera.position.z -= Math.cos(yaw)*speed;
}

if(keys['s']){
camera.position.x += Math.sin(yaw)*speed;
camera.position.z += Math.cos(yaw)*speed;
}

if(keys['a']){
camera.position.x -= Math.cos(yaw)*speed;
camera.position.z += Math.sin(yaw)*speed;
}

if(keys['d']){
camera.position.x += Math.cos(yaw)*speed;
camera.position.z -= Math.sin(yaw)*speed;
}

camera.lookAt(
camera.position.x - Math.sin(yaw),
camera.position.y,
camera.position.z - Math.cos(yaw)
);

renderer.render(scene,camera);

}

animate();

window.addEventListener('resize',()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script></body>
</html>
