<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Candi Untuk Nadia Zerlina</title><style>
body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
}

#title{
position:absolute;
top:15px;
width:100%;
text-align:center;
font-size:32px;
font-weight:bold;
color:#ff99cc;
text-shadow:0 0 10px #ff66cc;
z-index:100;
pointer-events:none;
}

.controls{
position:absolute;
bottom:20px;
left:20px;
z-index:100;
}

.btn{
width:60px;
height:60px;
border:none;
border-radius:15px;
font-size:24px;
margin:3px;
background:rgba(255,255,255,.7);
}

#lookArea{
position:absolute;
right:0;
top:0;
width:50%;
height:100%;
z-index:50;
}
</style></head>
<body><div id="title">
❤️ Buat Sayangku Nadia Zerlina ❤️
</div><div class="controls">
<div>
<button class="btn" id="up">⬆️</button>
</div>
<div>
<button class="btn" id="left">⬅️</button>
<button class="btn" id="down">⬇️</button>
<button class="btn" id="right">➡️</button>
</div>
</div><div id="lookArea"></div><script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(0,2,25);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

// cahaya
scene.add(
new THREE.AmbientLight(
0xffffff,
1
)
);

const sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(
50,
100,
50
);

scene.add(sun);

// tanah
const ground =
new THREE.Mesh(
new THREE.PlaneGeometry(
600,
600
),
new THREE.MeshStandardMaterial({
color:0x4caf50
})
);

ground.rotation.x =
-Math.PI/2;

scene.add(ground);

// fungsi candi
function createTemple(x,z,s=1){

const temple =
new THREE.Group();

const stone =
new THREE.MeshStandardMaterial({
color:0x777777
});

const base =
new THREE.Mesh(
new THREE.BoxGeometry(
4,1,4
),
stone
);

const body =
new THREE.Mesh(
new THREE.BoxGeometry(
2.5,5,2.5
),
stone
);

body.position.y=3;

const roof =
new THREE.Mesh(
new THREE.ConeGeometry(
2,
4,
4
),
stone
);

roof.position.y=7;
roof.rotation.y=
Math.PI/4;

temple.add(base);
temple.add(body);
temple.add(roof);

temple.position.set(x,0,z);

temple.scale.set(s,s,s);

scene.add(temple);
}

// candi utama
createTemple(0,0,3);

// 99 candi lainnya
let count=0;

for(let i=-5;i<=5;i++){

for(let j=-5;j<=5;j++){

if(i===0 && j===0) continue;

createTemple(
i*15,
j*15,
1
);

count++;

if(count>=99) break;

}

if(count>=99) break;

}

// kontrol
const keys={};

window.addEventListener(
'keydown',
e=>keys[e.key.toLowerCase()]=true
);

window.addEventListener(
'keyup',
e=>keys[e.key.toLowerCase()]=false
);

// tombol hp
function hold(id,key){

const el =
document.getElementById(id);

el.addEventListener(
'touchstart',
e=>{
e.preventDefault();
keys[key]=true;
}
);

el.addEventListener(
'touchend',
e=>{
e.preventDefault();
keys[key]=false;
}
);

}

hold('up','w');
hold('down','s');
hold('left','a');
hold('right','d');

// lihat sekitar
let yaw=0;

const lookArea =
document.getElementById(
'lookArea'
);

let lastX=null;

lookArea.addEventListener(
'touchmove',
e=>{

const x =
e.touches[0].clientX;

if(lastX!==null){

yaw +=
(x-lastX)*0.01;

}

lastX=x;

}
);

lookArea.addEventListener(
'touchend',
()=>{
lastX=null;
}
);

// animasi
function animate(){

requestAnimationFrame(
animate
);

const speed=0.5;

if(keys['w']){

camera.position.x +=
Math.sin(yaw)*speed;

camera.position.z -=
Math.cos(yaw)*speed;

}

if(keys['s']){

camera.position.x -=
Math.sin(yaw)*speed;

camera.position.z +=
Math.cos(yaw)*speed;

}

if(keys['a']){

camera.position.x -=
Math.cos(yaw)*speed;

camera.position.z -=
Math.sin(yaw)*speed;

}

if(keys['d']){

camera.position.x +=
Math.cos(yaw)*speed;

camera.position.z +=
Math.sin(yaw)*speed;

}

camera.position.y=2;

camera.lookAt(
camera.position.x+
Math.sin(yaw),
2,
camera.position.z-
Math.cos(yaw)
);

renderer.render(
scene,
camera
);

}

animate();

window.addEventListener(
'resize',
()=>{

camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script></body>
</html>
